<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Disha — NSPCL AI Chatbot</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', sans-serif;
    background: #f0f4f8;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ── */
  .header {
    background: linear-gradient(135deg, #0067B8, #004e8c);
    color: white;
    padding: 14px 24px;
    display: flex;
    align-items: center;
    gap: 14px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  }
  .avatar {
    width: 44px; height: 44px;
    background: white;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
  }
  .header-info h1 { font-size: 18px; font-weight: 600; }
  .header-info p  { font-size: 12px; opacity: 0.85; }
  .status-dot {
    width: 8px; height: 8px;
    background: #4ade80;
    border-radius: 50%;
    display: inline-block;
    margin-right: 5px;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%,100% { opacity: 1; } 50% { opacity: 0.4; }
  }

  /* ── Chat window ── */
  .chat-container {
    flex: 1;
    overflow-y: auto;
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    max-width: 860px;
    width: 100%;
    margin: 0 auto;
  }

  .message {
    display: flex;
    gap: 10px;
    align-items: flex-end;
    animation: fadeIn 0.2s ease;
  }
  @keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:none; } }

  .message.user  { flex-direction: row-reverse; }

  .msg-avatar {
    width: 32px; height: 32px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px;
    flex-shrink: 0;
  }
  .message.bot  .msg-avatar { background: #0067B8; color: white; }
  .message.user .msg-avatar { background: #e2e8f0; color: #334155; }

  .bubble {
    max-width: 72%;
    padding: 12px 16px;
    border-radius: 18px;
    font-size: 14px;
    line-height: 1.6;
    word-break: break-word;
  }
  .message.bot  .bubble {
    background: white;
    color: #1e293b;
    border-bottom-left-radius: 4px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
  }
  .message.user .bubble {
    background: #0067B8;
    color: white;
    border-bottom-right-radius: 4px;
  }

  .sources {
    margin-top: 8px;
    padding: 8px 10px;
    background: #f1f5f9;
    border-left: 3px solid #0067B8;
    border-radius: 4px;
    font-size: 12px;
    color: #475569;
  }
  .sources strong { color: #0067B8; }

  /* typing indicator */
  .typing .bubble {
    padding: 14px 18px;
  }
  .typing-dots { display: flex; gap: 4px; align-items: center; }
  .typing-dots span {
    width: 7px; height: 7px;
    background: #94a3b8;
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }
  .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%,60%,100% { transform: translateY(0); }
    30% { transform: translateY(-6px); }
  }

  /* ── Input bar ── */
  .input-bar {
    background: white;
    border-top: 1px solid #e2e8f0;
    padding: 14px 16px;
  }
  .input-inner {
    max-width: 860px;
    margin: 0 auto;
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }
  .input-wrap {
    flex: 1;
    background: #f8fafc;
    border: 1.5px solid #cbd5e1;
    border-radius: 24px;
    display: flex;
    align-items: center;
    padding: 8px 16px;
    transition: border-color 0.2s;
  }
  .input-wrap:focus-within { border-color: #0067B8; }
  textarea {
    flex: 1;
    border: none;
    background: transparent;
    resize: none;
    font-family: inherit;
    font-size: 14px;
    color: #1e293b;
    max-height: 100px;
    outline: none;
    line-height: 1.5;
  }
  .send-btn {
    width: 42px; height: 42px;
    background: #0067B8;
    border: none;
    border-radius: 50%;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s, transform 0.1s;
    flex-shrink: 0;
  }
  .send-btn:hover  { background: #004e8c; }
  .send-btn:active { transform: scale(0.93); }
  .send-btn svg { width: 18px; height: 18px; fill: white; }
  .send-btn:disabled { background: #94a3b8; cursor: not-allowed; }

  .options-row {
    max-width: 860px;
    margin: 6px auto 0;
    display: flex;
    gap: 8px;
    align-items: center;
    flex-wrap: wrap;
  }
  .opt-label { font-size: 12px; color: #64748b; }
  .toggle-sources {
    font-size: 12px;
    color: #0067B8;
    background: #eff6ff;
    border: 1px solid #bfdbfe;
    border-radius: 20px;
    padding: 3px 12px;
    cursor: pointer;
    transition: background 0.2s;
  }
  .toggle-sources.active { background: #0067B8; color: white; border-color: #0067B8; }
  .clear-btn {
    font-size: 12px;
    color: #ef4444;
    background: #fff1f2;
    border: 1px solid #fecaca;
    border-radius: 20px;
    padding: 3px 12px;
    cursor: pointer;
    margin-left: auto;
  }
  .clear-btn:hover { background: #fee2e2; }

  /* welcome */
  .welcome {
    text-align: center;
    padding: 40px 20px;
    color: #64748b;
  }
  .welcome h2 { font-size: 22px; color: #1e293b; margin-bottom: 8px; }
  .welcome p  { font-size: 14px; margin-bottom: 20px; }
  .suggestions { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
  .suggestion {
    background: white;
    border: 1.5px solid #cbd5e1;
    border-radius: 20px;
    padding: 7px 16px;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
    color: #334155;
  }
  .suggestion:hover { border-color: #0067B8; color: #0067B8; background: #eff6ff; }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="avatar">🤖</div>
  <div class="header-info">
    <h1>Disha</h1>
    <p><span class="status-dot"></span>NSPCL AI Assistant · Powered by RAG + Ollama</p>
  </div>
</div>

<!-- Chat -->
<div class="chat-container" id="chatContainer">
  <div class="welcome" id="welcome">
    <h2>👋 Hello! I'm Disha</h2>
    <p>Ask me anything about NSPCL documents, policies, or procedures.</p>
    <div class="suggestions">
      <div class="suggestion" onclick="sendSuggestion(this)">What is the leave policy?</div>
      <div class="suggestion" onclick="sendSuggestion(this)">Summarize the safety guidelines</div>
      <div class="suggestion" onclick="sendSuggestion(this)">What are the HR procedures?</div>
      <div class="suggestion" onclick="sendSuggestion(this)">Hello!</div>
    </div>
  </div>
</div>

<!-- Input -->
<div class="input-bar">
  <div class="input-inner">
    <div class="input-wrap">
      <textarea id="queryInput" rows="1" placeholder="Ask Disha anything…"
        onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    </div>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
    </button>
  </div>
  <div class="options-row">
    <span class="opt-label">Options:</span>
    <button class="toggle-sources" id="srcToggle" onclick="toggleSources()">Show Sources</button>
    <button class="clear-btn" onclick="clearChat()">🗑 Clear Chat</button>
  </div>
</div>

<script>
  const API = "http://localhost:8000/api/v1";
  const SESSION_ID = "user_" + Math.random().toString(36).slice(2, 9);
  let showSources = false;
  let isLoading = false;

  function toggleSources() {
    showSources = !showSources;
    const btn = document.getElementById("srcToggle");
    btn.classList.toggle("active", showSources);
    btn.textContent = showSources ? "✓ Sources ON" : "Show Sources";
  }

  function autoResize(el) {
    el.style.height = "auto";
    el.style.height = Math.min(el.scrollHeight, 100) + "px";
  }

  function handleKey(e) {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  }

  function sendSuggestion(el) {
    document.getElementById("queryInput").value = el.textContent;
    sendMessage();
  }

  function appendMessage(role, text, sources) {
    const welcome = document.getElementById("welcome");
    if (welcome) welcome.remove();

    const container = document.getElementById("chatContainer");
    const div = document.createElement("div");
    div.className = "message " + role;

    const avatarDiv = document.createElement("div");
    avatarDiv.className = "msg-avatar";
    avatarDiv.textContent = role === "bot" ? "🤖" : "👤";

    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.innerHTML = text.replace(/\n/g, "<br>");

    if (sources && sources.length > 0) {
      const srcDiv = document.createElement("div");
      srcDiv.className = "sources";
      srcDiv.innerHTML = "<strong>📄 Sources:</strong><br>" +
        sources.map(s => `• ${s.source}${s.page ? " (p." + s.page + ")" : ""}: ${s.snippet}`).join("<br>");
      bubble.appendChild(srcDiv);
    }

    div.appendChild(avatarDiv);
    div.appendChild(bubble);
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
    return div;
  }

  function showTyping() {
    const container = document.getElementById("chatContainer");
    const div = document.createElement("div");
    div.className = "message bot typing";
    div.id = "typingIndicator";
    div.innerHTML = `
      <div class="msg-avatar">🤖</div>
      <div class="bubble"><div class="typing-dots">
        <span></span><span></span><span></span>
      </div></div>`;
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
  }

  function removeTyping() {
    const t = document.getElementById("typingIndicator");
    if (t) t.remove();
  }

  async function sendMessage() {
    if (isLoading) return;
    const input = document.getElementById("queryInput");
    const query = input.value.trim();
    if (!query) return;

    input.value = "";
    input.style.height = "auto";
    appendMessage("user", query);
    showTyping();
    isLoading = true;
    document.getElementById("sendBtn").disabled = true;

    try {
      const res = await fetch(`${API}/query`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          query,
          session_id: SESSION_ID,
          include_sources: showSources
        })
      });

      const data = await res.json();
      removeTyping();

      if (res.ok) {
        appendMessage("bot", data.answer, data.sources);
      } else {
        appendMessage("bot", "⚠️ Error: " + (data.detail || "Something went wrong."));
      }
    } catch (err) {
      removeTyping();
      appendMessage("bot", "⚠️ Cannot connect to the API. Make sure the server is running on port 8000.");
    }

    isLoading = false;
    document.getElementById("sendBtn").disabled = false;
    document.getElementById("queryInput").focus();
  }

  async function clearChat() {
    await fetch(`${API}/session/clear`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ session_id: SESSION_ID })
    }).catch(() => {});

    const container = document.getElementById("chatContainer");
    container.innerHTML = `
      <div class="welcome" id="welcome">
        <h2>👋 Hello! I'm Disha</h2>
        <p>Ask me anything about NSPCL documents, policies, or procedures.</p>
        <div class="suggestions">
          <div class="suggestion" onclick="sendSuggestion(this)">What is the leave policy?</div>
          <div class="suggestion" onclick="sendSuggestion(this)">Summarize the safety guidelines</div>
          <div class="suggestion" onclick="sendSuggestion(this)">What are the HR procedures?</div>
          <div class="suggestion" onclick="sendSuggestion(this)">Hello!</div>
        </div>
      </div>`;
  }
</script>
</body>
</html>
